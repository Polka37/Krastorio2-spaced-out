[entity-description]
kr-advanced-assembling-machine=Eine leistungsfähigere Montagemaschine, sie besitzt einige fortgeschrittene Verfahren, um Erze direkt in Zwischenprodukte zu verwandeln.
kr-advanced-chemical-plant=Eine leistungsfähigere Chemiefabrik.
kr-advanced-furnace=Ein leistungsfähigerer Schmelzofen.
kr-advanced-lab=Vielen Dank an BiusArt für die Erlaubnis, dieses Labor in K2 zu verwenden.
kr-advanced-steam-turbine=Verbraucht heißen Dampf aus einem [entity=kr-fusion-reactor] Fusionsreaktor, um Energie zu erzeugen.
kr-air-purifier=Absorbiert die Umweltverschmutzung im Chunk, wo er platziert ist. Filter haben eine 10%ige Chance, zerstört zu werden.
kr-atmospheric-condenser=Extrahiert Gase langsam aus der Atmosphäre.
kr-bio-lab=Züchtet Biomasse und andere biologische Produkte.
kr-burner-leech-description=Dieser Greifarm kann Brennstoff aus Öfen (oder anderen Entitäten) entnehmen, die er erreichen kann.
kr-crash-site-building=[color=red]Achtung![/color] Wenn diese Gebäude abgebaut wird, werden einige Rohmaterialien erstattet aber es kann nicht wieder gebaut werden!
kr-crusher=Zerkleinert Gegenstände welche hineingelegt werden. Bei einigen Gegenstände werden Komponenten zurückgeben, aber die meisten Gegenstände werden komplett zerkleinert!
kr-electrolysis-plant=Leitet Strom durch Flüssigkeiten um chemische Reaktionen zu erzeugen.
kr-filtration-plant=Filtert bestimmte Materialien aus Flüssigkeiten.
kr-flare-stack=Verbrennt jede Flüssigkeit, wodurch eine große Menge an Verschmutzung und gelegentlich einige Nebenprodukte freigesetzt werden.
kr-fusion-reactor=Verschmilzt die Atome in einer [item=kr-dt-fuel-cell] DT-Treibstoffzelle, um eine große Menge Energie freizusetzen. Ein Fusionsreaktor kann 20 fortgeschrittene Turbinen betreiben.
kr-gas-power-station=Verbrennt Flüssigkeit, um Energie zu erzeugen. Ineffizient, aber einfach!
kr-greenhouse=Anbau und Ernte von Holz und Anbau von Pflanzen zur Dekoration und/oder Renaturierung.
kr-legacy-steel-pipe-to-ground=Diese Entität dient zur Migration von Spielständen vor Version 2.0 und hält diese funktionsfähig. Wenn du diese Entität entfernst, kannst du sie nicht zurückbekommen!
kr-matter-associator=Verwandelt Materie in Zwischenprodukte.
kr-matter-plant=Wandelt Materialien in rohe Materie um.
kr-planetary-teleporter=Transportiert einen Spieler sofort zu einem anderen Teleporter auf derselben Oberfläche.
kr-rocket-silo=Erstellt und startet Raketen in den Weltraum.
kr-sentinel=Bewacht eine kleine Fläche.
kr-shelter-plus=Verbesserter Unterstand für Energie Dämonen! Legt den Startpunkt für dein Team fest. Jedes Team kann nur einen Unterstand haben.
kr-shelter=Legt den Startpunkt für dein Team fest. Jedes Team kann nur einen Unterstand haben.
kr-stabilizer-charging-station=Lädt Materiestabilisierungszellen.
kr-steel-pipe=Ein Rohr, das größeren Druck aushält.
kr-steel-pipe-to-ground=Ein unterirdisches Rohr, das größeren Druck aushält.
kr-tesla-coil=Lädt Ausrüstungsraster mit [item=kr-energy-absorber-equipment] Energieabsorber auf. Zwei Türme dürfen nicht zu dicht beieinander platziert werden!
kr-wind-turbine=Erzeugt eine geringe Menge an Energie durch Wind.

